name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
      - name: Trivy Dependency Scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: "."
          scanners: vuln
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy-deps.sarif

      - name: Upload Dependency Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-deps.sarif
          category: dependency-audit

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-scan:
    name: Docker and IaC Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trivy IaC Scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: "."
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: "0"
          format: table
      - name: Build Docker Image
        run: docker build -t foodbot:scan .
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: foodbot:scan
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy-image.sarif

      - name: Upload Image Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: docker-scan
